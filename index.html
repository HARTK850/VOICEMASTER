<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת קריינות AI Ultra Pro - Gemini Powered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap');
        
        body {ש
            font-family: 'Assistant', sans-serif;
            background: #f1f5f9;
            transition: all 0.3s ease;
        }

        .dark-mode {
            background: #020617;
            color: #f8fafc;
        }

        .dark-mode .card {
            background: #1e293b;
            border-color: #334155;
        }

        .card {
            background: white;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .loading-spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        canvas {
            width: 100%;
            height: 80px;
            border-radius: 12px;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .music-tag {
            cursor: pointer;
            transition: all 0.2s;
        }
        .music-tag.active {
            background: #2563eb;
            color: white;
        }

        .sparkle-btn {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
        }

        .ai-glow {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="min-h-screen py-6 px-4" id="bodyTag">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-black text-slate-800 dark:text-white">VOICE<span class="text-indigo-600">MASTER</span> <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full mr-2 tracking-widest uppercase">Gemini Edition ✨</span></h1>
            </div>
            <div class="flex gap-2">
                <button id="toggleDark" class="p-2 rounded-lg card shadow-sm">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <!-- Sidebar -->
            <div class="xl:col-span-1 space-y-6">
                <!-- AI Smart Tools -->
                <div class="card p-5 rounded-2xl shadow-sm border-indigo-100 bg-gradient-to-br from-white to-indigo-50/50">
                    <h3 class="text-sm font-bold mb-4 flex items-center gap-2 text-indigo-800">בינה מלאכותית ✨</h3>
                    <div class="space-y-2">
                        <button id="aiWriterBtn" class="w-full sparkle-btn text-xs font-bold py-3 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all">צור תסריט חדש ✨</button>
                        <button id="aiExpandBtn" class="w-full bg-indigo-50 text-indigo-700 text-xs font-bold py-3 rounded-xl hover:bg-indigo-100 transition-all flex items-center justify-center gap-2">המשך את הטקסט ✨</button>
                        <button id="aiAnalyzeBtn" class="w-full bg-white text-indigo-600 border border-indigo-200 text-xs font-bold py-3 rounded-xl hover:bg-indigo-50 transition-all flex items-center justify-center gap-2">ניתוח רגש והתאמה ✨</button>
                    </div>
                </div>

                <div class="card p-5 rounded-2xl shadow-sm border-emerald-100">
                    <h3 class="text-sm font-bold mb-4 text-emerald-800">עריכה מהירה ✨</h3>
                    <div class="space-y-2">
                        <button id="vocalizeBtn" class="w-full bg-emerald-50 text-emerald-600 text-xs font-bold py-2.5 rounded-xl hover:bg-emerald-100 transition-all">ניקוד אוטומטי ✨</button>
                        <button id="refineBtn" class="w-full bg-emerald-50 text-emerald-600 text-xs font-bold py-2.5 rounded-xl hover:bg-emerald-100 transition-all">ליטוש וסגנון ✨</button>
                    </div>
                </div>

                <div class="card p-5 rounded-2xl shadow-sm">
                    <h3 class="text-sm font-bold mb-4">מוזיקת רקע</h3>
                    <div class="flex flex-wrap gap-2 mb-4" id="musicOptions">
                        <span class="music-tag active px-3 py-1 rounded-full bg-slate-100 text-xs font-medium" data-src="">ללא</span>
                        <span class="music-tag px-3 py-1 rounded-full bg-slate-100 text-xs font-medium" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">Lo-Fi</span>
                        <span class="music-tag px-3 py-1 rounded-full bg-slate-100 text-xs font-medium" data-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3">דרמטי</span>
                    </div>
                    <input type="range" id="musicVol" min="0" max="0.5" step="0.05" value="0.1" class="w-full h-1 bg-slate-200 rounded-lg appearance-none accent-indigo-600">
                </div>
            </div>

            <!-- Editor & Controls -->
            <div class="xl:col-span-3 space-y-6">
                <div class="card p-6 rounded-3xl shadow-sm ai-glow">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex gap-2">
                             <button id="aiTranslateBtn" class="text-xs font-bold bg-slate-100 text-slate-600 px-4 py-2 rounded-xl hover:bg-slate-200 transition-all">תרגום מהיר ✨</button>
                        </div>
                        <button id="clearText" class="text-xs text-slate-400 hover:text-red-500 transition-colors">נקה הכל</button>
                    </div>
                    <textarea id="textInput" rows="10" class="w-full p-6 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-xl leading-relaxed custom-scrollbar" placeholder="הקלד כאן את הטקסט לקריינות..."></textarea>
                    <div class="flex justify-between mt-4 px-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <span id="charCount">0 תווים</span>
                        <span id="estTime">זמן מוערך: 0:00</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="card p-6 rounded-3xl shadow-sm space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 block mb-2">קריין</label>
                                <select id="voiceSelect" class="w-full p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border-none text-sm font-semibold">
                                    <optgroup label="גברים (Male)">
                                        <option value="Fenrir">Fenrir (סמכותי)</option>
                                        <option value="Puck">Puck (צעיר)</option>
                                        <option value="Charon">Charon (עמוק)</option>
                                        <option value="Kore">Kore (עסקי)</option>
                                    </optgroup>
                                    <optgroup label="נשים (Female)">
                                        <option value="Aoede">Aoede (רגועה)</option>
                                        <option value="Leda">Leda (ברורה)</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 block mb-2">סגנון רגשי</label>
                                <select id="styleSelect" class="w-full p-3 bg-slate-50 dark:bg-slate-800 rounded-xl border-none text-sm">
                                    <option value="natural">טבעי</option>
                                    <option value="cheerful">שמח ואנרגטי</option>
                                    <option value="serious">רשמי וקר</option>
                                    <option value="whisper">לחישה סודית</option>
                                    <option value="news">חדשותי/דיווח</option>
                                    <option value="drama">דרמטי/מרגש</option>
                                    <option value="storytelling">מספר סיפורים</option>
                                    <option value="shouting">צעקה/אזהרה</option>
                                </select>
                            </div>
                        </div>
                        <button id="generateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3">
                            <span id="btnText">הפק קריינות עכשיו</span>
                            <div id="btnLoader" class="loading-spinner hidden"></div>
                        </button>
                    </div>

                    <div class="card p-6 rounded-3xl shadow-sm flex flex-col justify-center min-h-[220px]">
                        <div id="playerPlaceholder" class="flex flex-col items-center justify-center h-full text-slate-300 gap-3">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <p class="text-xs font-bold uppercase tracking-widest">ממתין להפקה</p>
                        </div>
                        <div id="activePlayer" class="hidden space-y-4 w-full">
                            <canvas id="visualizer"></canvas>
                            <audio id="audioPlayer" controls class="w-full"></audio>
                            <audio id="bgMusicPlayer" loop></audio>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AI Modal -->
    <div id="aiModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h3 id="modalTitle" class="text-xl font-bold mb-4 text-indigo-800">מה הנושא שלך? ✨</h3>
            <textarea id="aiPromptInput" class="w-full p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl mb-6 outline-none min-h-[100px]" placeholder="לדוגמה: פרסומת לבית קפה חדש..."></textarea>
            <div class="flex gap-3">
                <button id="modalAction" class="flex-grow bg-indigo-600 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-indigo-700 transition-all">בצע ✨</button>
                <button id="modalClose" class="px-6 bg-slate-200 dark:bg-slate-700 font-bold py-3 rounded-xl">ביטול</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const apiKey = ""; // Environment handles this
            const state = { audioContext: null, analyser: null, animationId: null };

            const els = {
                body: document.getElementById('bodyTag'),
                textInput: document.getElementById('textInput'),
                charCount: document.getElementById('charCount'),
                estTime: document.getElementById('estTime'),
                generateBtn: document.getElementById('generateBtn'),
                btnText: document.getElementById('btnText'),
                btnLoader: document.getElementById('btnLoader'),
                playerPlaceholder: document.getElementById('playerPlaceholder'),
                activePlayer: document.getElementById('activePlayer'),
                audioPlayer: document.getElementById('audioPlayer'),
                bgMusicPlayer: document.getElementById('bgMusicPlayer'),
                visualizer: document.getElementById('visualizer'),
                musicOptions: document.querySelectorAll('.music-tag'),
                musicVol: document.getElementById('musicVol'),
                aiModal: document.getElementById('aiModal'),
                aiPromptInput: document.getElementById('aiPromptInput'),
                modalTitle: document.getElementById('modalTitle'),
                modalAction: document.getElementById('modalAction'),
                modalClose: document.getElementById('modalClose'),
                toggleDark: document.getElementById('toggleDark'),
                clearText: document.getElementById('clearText'),
                vocalizeBtn: document.getElementById('vocalizeBtn'),
                refineBtn: document.getElementById('refineBtn'),
                voiceSelect: document.getElementById('voiceSelect'),
                styleSelect: document.getElementById('styleSelect'),
                aiWriterBtn: document.getElementById('aiWriterBtn'),
                aiExpandBtn: document.getElementById('aiExpandBtn'),
                aiAnalyzeBtn: document.getElementById('aiAnalyzeBtn'),
                aiTranslateBtn: document.getElementById('aiTranslateBtn')
            };

            // Helpers
            const setLoading = (l) => {
                if (!els.generateBtn) return;
                els.generateBtn.disabled = l;
                els.btnText.textContent = l ? "מעבד שמע..." : "הפק קריינות עכשיו";
                els.btnLoader.classList.toggle('hidden', !l);
            };

            const showModal = (title, placeholder, action) => {
                els.modalTitle.textContent = title;
                els.aiPromptInput.placeholder = placeholder;
                els.aiPromptInput.value = "";
                els.aiModal.classList.remove('hidden');
                els.aiModal.classList.add('flex');
                els.modalAction.onclick = action;
            };

            // Enhanced AI Logic with better error handling
            async function callGemini(prompt, isJson = false) {
                let retryCount = 0;
                const maxRetries = 5;
                const backoff = (retry) => new Promise(res => setTimeout(res, Math.pow(2, retry) * 1000));

                while (retryCount < maxRetries) {
                    try {
                        const config = {
                            contents: [{ parts: [{ text: prompt }] }],
                        };
                        if (isJson) {
                            config.generationConfig = { responseMimeType: "application/json" };
                        }

                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(config)
                        });

                        if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);

                        const data = await res.json();
                        const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        
                        if (!resultText) throw new Error("Empty response from AI");
                        return resultText;

                    } catch (e) {
                        retryCount++;
                        if (retryCount >= maxRetries) {
                            console.error("Gemini Final Error:", e);
                            return null;
                        }
                        await backoff(retryCount);
                    }
                }
            }

            async function runAiTool(btn, systemPrompt, customPrompt = null, append = false) {
                const text = customPrompt || els.textInput.value.trim();
                if (!text && !customPrompt) return;
                
                const originalHtml = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = `<div class="loading-spinner"></div>`;
                
                const result = await callGemini(`${systemPrompt}: \n\n${text}`);
                if (result) {
                    if (append) {
                        els.textInput.value += "\n\n" + result.trim();
                    } else {
                        els.textInput.value = result.trim();
                    }
                    els.textInput.dispatchEvent(new Event('input'));
                } else {
                    console.error("AI Tool failed to return result");
                }
                
                btn.disabled = false;
                btn.innerHTML = originalHtml;
                els.aiModal.classList.add('hidden');
            }

            // --- Gemini Features ---

            els.aiAnalyzeBtn.onclick = async () => {
                const text = els.textInput.value.trim();
                if (!text) return;
                
                const btn = els.aiAnalyzeBtn;
                const originalHtml = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = `<div class="loading-spinner"></div>`;

                const prompt = `Analyze this voiceover script and suggest the best 'voice' and 'style' from the following options. 
                Voices: Fenrir, Puck, Charon, Kore, Aoede, Leda.
                Styles: natural, cheerful, serious, whisper, news, drama, storytelling, shouting.
                Return ONLY a JSON object: {"voice": "...", "style": "...", "reason": "..."}.
                Script: ${text}`;

                const result = await callGemini(prompt, true);
                if (result) {
                    try {
                        const suggestion = JSON.parse(result);
                        els.voiceSelect.value = suggestion.voice;
                        els.styleSelect.value = suggestion.style;
                        btn.classList.add('bg-indigo-600', 'text-white');
                        setTimeout(() => btn.classList.remove('bg-indigo-600', 'text-white'), 2000);
                    } catch (e) {
                        console.error("Failed to parse AI Suggestion JSON", e);
                    }
                }
                
                btn.disabled = false;
                btn.innerHTML = originalHtml;
            };

            els.aiExpandBtn.onclick = (e) => runAiTool(e.currentTarget, "המשך את הטקסט הבא בעוד פסקה אחת בלבד שמתאימה לסגנון", null, true);

            els.aiWriterBtn.onclick = () => {
                showModal("על מה התסריט? ✨", "תאר את הנושא או המוצר...", (e) => {
                    runAiTool(e.currentTarget, "כתוב תסריט קריינות מקצועי באורך בינוני על הנושא הבא", els.aiPromptInput.value);
                });
            };

            els.vocalizeBtn.onclick = (e) => runAiTool(e.currentTarget, "הוסף ניקוד מלא ומדויק לעברית");
            els.refineBtn.onclick = (e) => runAiTool(e.currentTarget, "שפר את הניסוח שיהיה קולח ומתאים לקריינות");
            els.aiTranslateBtn.onclick = (e) => runAiTool(e.currentTarget, "תרגם את הטקסט לשפה השנייה (עברית לאנגלית או להפך)");

            // Generation & Audio
            async function generate() {
                const text = els.textInput.value.trim();
                if (!text) return;
                setLoading(true);
                
                const voice = els.voiceSelect.value;
                const style = els.styleSelect.value;
                const stylePromptMap = {
                    natural: "natural and clear",
                    cheerful: "cheerful and happy",
                    serious: "serious and professional",
                    whisper: "whispering and quiet",
                    news: "news reporting style",
                    drama: "emotional and dramatic",
                    storytelling: "engaging storytelling",
                    shouting: "shouting and urgent"
                };

                let retryCount = 0;
                const maxRetries = 5;
                const backoff = (retry) => new Promise(res => setTimeout(res, Math.pow(2, retry) * 1000));

                while (retryCount < maxRetries) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: `Say this in a ${stylePromptMap[style]} tone: ${text}` }] }],
                                generationConfig: {
                                    responseModalities: ["AUDIO"],
                                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                                },
                                model: "gemini-2.5-flash-preview-tts"
                            })
                        });

                        if (!response.ok) throw new Error(`TTS HTTP Error: ${response.status}`);

                        const data = await response.json();
                        const audioData = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                        
                        if (audioData) {
                            const blob = pcmToWav(audioData, 24000);
                            const url = URL.createObjectURL(blob);
                            els.audioPlayer.src = url;
                            els.playerPlaceholder.classList.add('hidden');
                            els.activePlayer.classList.remove('hidden');
                            els.audioPlayer.play().catch(e => console.error("Audio Play Error:", e));
                            setupVisualizer();
                            break; // Success
                        } else {
                            throw new Error("No audio data received");
                        }
                    } catch (err) {
                        retryCount++;
                        if (retryCount >= maxRetries) {
                            console.error("TTS Generation Final Failure:", err);
                        } else {
                            await backoff(retryCount);
                        }
                    }
                }
                setLoading(false);
            }

            function pcmToWav(base64, rate) {
                const binary = atob(base64);
                const len = binary.length;
                const buf = new ArrayBuffer(44 + len);
                const view = new DataView(buf);
                const s = (o, str) => { for(let i=0;i<str.length;i++) view.setUint8(o+i, str.charCodeAt(i)) };
                s(0, 'RIFF'); view.setUint32(4, 32+len, true); s(8, 'WAVE'); s(12, 'fmt ');
                view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, rate, true); view.setUint32(28, rate*2, true);
                view.setUint16(32, 2, true); view.setUint16(34, 16, true); s(36, 'data');
                view.setUint32(40, len, true);
                for(let i=0;i<len;i++) view.setUint8(44+i, binary.charCodeAt(i));
                return new Blob([buf], { type: 'audio/wav' });
            }

            function setupVisualizer() {
                if (!state.audioContext) {
                    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const source = state.audioContext.createMediaElementSource(els.audioPlayer);
                    state.analyser = state.audioContext.createAnalyser();
                    source.connect(state.analyser);
                    state.analyser.connect(state.audioContext.destination);
                    state.analyser.fftSize = 64;
                }
                const ctx = els.visualizer.getContext('2d');
                const dataArray = new Uint8Array(state.analyser.frequencyBinCount);
                function draw() {
                    state.animationId = requestAnimationFrame(draw);
                    state.analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, els.visualizer.width, els.visualizer.height);
                    const barWidth = (els.visualizer.width / dataArray.length) * 1.5;
                    let x = 0;
                    for(let i = 0; i < dataArray.length; i++) {
                        const h = dataArray[i] / 2.5;
                        ctx.fillStyle = els.body.classList.contains('dark-mode') ? '#818cf8' : '#6366f1';
                        ctx.fillRect(x, els.visualizer.height - h, barWidth - 2, h);
                        x += barWidth;
                    }
                }
                if(state.animationId) cancelAnimationFrame(state.animationId);
                draw();
            }

            // Standard events
            els.textInput.oninput = () => {
                const val = els.textInput.value.trim();
                els.charCount.textContent = `${val.length} תווים`;
                const sec = Math.floor(val.length / 14);
                els.estTime.textContent = `זמן מוערך: ${Math.floor(sec/60)}:${(sec%60).toString().padStart(2, '0')}`;
            };
            els.musicOptions.forEach(opt => {
                opt.onclick = () => {
                    els.musicOptions.forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    const src = opt.getAttribute('data-src');
                    if (src) {
                        els.bgMusicPlayer.src = src;
                        els.bgMusicPlayer.volume = els.musicVol.value;
                        if (!els.audioPlayer.paused) els.bgMusicPlayer.play().catch(e => {});
                    } else {
                        els.bgMusicPlayer.pause();
                        els.bgMusicPlayer.src = "";
                    }
                };
            });
            els.musicVol.oninput = (e) => els.bgMusicPlayer.volume = e.target.value;
            els.clearText.onclick = () => { els.textInput.value = ""; els.textInput.dispatchEvent(new Event('input')); };
            els.toggleDark.onclick = () => els.body.classList.toggle('dark-mode');
            els.modalClose.onclick = () => els.aiModal.classList.add('hidden');
            els.generateBtn.onclick = generate;
        });
    </script>
</body>
</html>
